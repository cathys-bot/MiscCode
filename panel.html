<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <style>
    body { font-family: sans-serif; padding: 10px; }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background-color: #0500FF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background-color: #0400D0; }
  </style>
</head>
<body>
  <h3>Activity Tracker</h3>
  <button id="start-btn">Log Start Time</button>
  <button id="end-btn" style="background-color: #FF6B6B;">Log End Time</button>

  <script>
    miro.onReady(() => {
      document.getElementById('start-btn').addEventListener('click', () => logTime('START'));
      document.getElementById('end-btn').addEventListener('click', () => logTime('END'));
    });

    async function logTime(type) {
      try {
        const userInfo = await miro.board.getUserInfo();
        const timestamp = new Date().toLocaleString();
        const viewport = await miro.board.viewport.get();
        const x = viewport.x + viewport.width / 2;
        const y = viewport.y + viewport.height / 2;

        const sticky = await miro.board.createStickyNote({
          content: `<strong>${type} TIME</strong><br>User: ${userInfo.id}<br>Time: ${timestamp}`,
          x: x,
          y: y,
          style: { fillColor: type === 'START' ? 'light_green' : 'light_pink' }
        });

        await miro.board.utils.lock(sticky.id);
        alert(`${type} time recorded and locked!`);
      } catch (error) {
        console.error("Error:", error);
      }
    }
  </script>
</body>
</html>
