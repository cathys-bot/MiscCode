<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <script>
    // As soon as the Miro board loads, add our app icon to the toolbar
    miro.onReady(async () => {
      await miro.board.ui.on('icon:click', async () => {
        // When the user clicks our icon, slide out the panel file
        await miro.board.ui.openPanel({ url: 'panel.html' });
      });
    });
  </script>
</head>
<body>
</body>
</html>
